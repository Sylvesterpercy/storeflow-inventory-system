<!DOCTYPE html>
<html>

<head>
    <title>StoreFlow - Admin Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h3 class="text-center mb-1">StoreFlow</h3>
                    <p class="text-center text-muted mb-4">Admin Registration</p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Organization Name</label>
                            <input type="text" name="organization_name" class="form-control" placeholder="e.g. ABC College">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Admin Username</label>
                            <input type="text" name="username" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="you@example.com">
                            <small class="text-muted">Low stock alerts will be sent to this email</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control">
                            <small class="text-muted">Min 8 chars, one uppercase, one number, one special character (@#!$%&*)</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success w-100">Create Admin Account</button>
                    </form>

                    <p class="text-center mt-3">
                        <a href="/login/">Already have an account? Login</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
