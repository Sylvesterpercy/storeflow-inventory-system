<!DOCTYPE html>
<html>

<head>
    <title>StoreFlow - Update Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">StoreFlow</span>
    <a href="/" class="text-white text-decoration-none">Back to List</a>
</nav>

<div class="container mt-4">
    <h4 class="mb-3">Update Inventory Item</h4>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Item Name</label>
                    <input type="text" name="item_name" class="form-control" value="{{ item.item_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="quantity" id="quantity" class="form-control" value="{{ item.quantity }}" min="0" required onkeyup="calcTotal()">
                </div>

                <div class="mb-3">
                    <label class="form-label">Unit Price</label>
                    <input type="number" name="price" id="price" class="form-control" value="{{ item.price }}" step="0.01" min="0" required onkeyup="calcTotal()">
                </div>

                <div class="mb-3">
                    <label class="form-label">Total Price</label>
                    <input type="text" id="total_price" class="form-control" readonly value="₹{{ item.total_price }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Supplier</label>
                    <input type="text" name="supplier" class="form-control" value="{{ item.supplier }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="Electronics" {% if item.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                        <option value="Furniture" {% if item.category == 'Furniture' %}selected{% endif %}>Furniture</option>
                        <option value="Stationery" {% if item.category == 'Stationery' %}selected{% endif %}>Stationery</option>
                        <option value="Clothing" {% if item.category == 'Clothing' %}selected{% endif %}>Clothing</option>
                        <option value="Other" {% if item.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Update</button>

            </form>
        </div>
    </div>
</div>

</body>
</html>

<script>
    function calcTotal() {
        var qty = document.getElementById('quantity').value;
        var price = document.getElementById('price').value;
        if (qty && price) {
            var total = parseFloat(qty) * parseFloat(price);
            document.getElementById('total_price').value = '₹' + total.toFixed(2);
        } else {
            document.getElementById('total_price').value = '';
        }
    }
</script>
