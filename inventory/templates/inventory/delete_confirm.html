{% extends 'inventory/base.html' %}

{% block title %}StoreFlow - Delete Item{% endblock %}

{% block content %}

<div class="card shadow-sm" style="max-width: 450px;">
    <div class="card-body">
        <h5 class="mb-3">Delete Item</h5>
        <p class="text-muted">Are you sure you want to delete <strong>{{ item.item_name }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="/" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
