<!DOCTYPE html>
<html>

<head>
    <title>StoreFlow - Stock Movement</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success px-4">
    <span class="navbar-brand fw-bold">StoreFlow</span>
    <a href="/" class="text-white text-decoration-none">Back to List</a>
</nav>

<div class="container mt-4">
    <h4 class="mb-1">Stock Movement</h4>
    <p class="text-muted">Item: <strong>{{ item.item_name }}</strong> &nbsp;|&nbsp; Current Stock: <strong>{{ item.quantity }}</strong></p>

    {% if messages %}
        {% for message in messages %}
            {% if message.tags == 'error' %}
                <div class="alert alert-danger">{{ message }}</div>
            {% else %}
                <div class="alert alert-success">{{ message }}</div>
            {% endif %}
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm" style="max-width: 450px;">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Movement Type</label>
                    <select name="movement_type" class="form-select">
                        <option value="IN">Stock In</option>
                        <option value="OUT">Stock Out</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="quantity" class="form-control" min="1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <input type="text" name="reason" class="form-control" placeholder="e.g. New purchase, Sold to customer" required>
                </div>

                <button type="submit" class="btn btn-success">Submit</button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
