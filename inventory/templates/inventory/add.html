{% extends 'inventory/base.html' %}

{% block title %}StoreFlow - Add Item{% endblock %}

{% block content %}

<h4 class="mb-3">Add Inventory Item</h4>

<div class="card shadow-sm" style="max-width: 500px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Item Name</label>
                <input type="text" name="item_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" id="quantity" class="form-control" min="0" required onkeyup="calcTotal()">
            </div>

            <div class="mb-3">
                <label class="form-label">Unit Price</label>
                <input type="number" name="price" id="price" class="form-control" step="0.01" min="0" required onkeyup="calcTotal()">
            </div>

            <div class="mb-3">
                <label class="form-label">Total Price</label>
                <input type="text" id="total_price" class="form-control" readonly placeholder="Auto calculated">
            </div>

            <div class="mb-3">
                <label class="form-label">Supplier</label>
                <input type="text" name="supplier" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" id="category" class="form-select" onchange="checkOther()">
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Stationery">Stationery</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3" id="other_category_div" style="display:none;">
                <label class="form-label">Specify Category</label>
                <input type="text" name="other_category" class="form-control" placeholder="Enter category name">
            </div>

            <button type="submit" class="btn btn-success">Save</button>

        </form>
    </div>
</div>

<script>
    function calcTotal() {
        var qty = document.getElementById('quantity').value;
        var price = document.getElementById('price').value;
        if (qty && price) {
            var total = parseFloat(qty) * parseFloat(price);
            document.getElementById('total_price').value = '₹' + total.toFixed(2);
        } else {
            document.getElementById('total_price').value = '';
        }
    }

    function checkOther() {
        var category = document.getElementById('category').value;
        var otherDiv = document.getElementById('other_category_div');
        if (category === 'Other') {
            otherDiv.style.display = 'block';
        } else {
            otherDiv.style.display = 'none';
        }
    }
</script>

{% endblock %}
