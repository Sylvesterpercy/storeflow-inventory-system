<!DOCTYPE html>
<html>

<head>
    <title>StoreFlow - Staff Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h3 class="text-center mb-1">StoreFlow</h3>
                    <p class="text-center text-muted mb-4">Staff Login</p>

                    <!-- two login buttons -->
                    <div class="d-flex justify-content-center gap-3 mb-4">
                        <a href="/login/" class="btn btn-outline-success">Admin Login</a>
                        <a href="/staff-login/" class="btn btn-success">Staff Login</a>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success w-100">Login as Staff</button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
