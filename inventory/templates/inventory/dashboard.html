<!DOCTYPE html>
<html>

<head>
    <title>StoreFlow - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success px-4">
    <span class="navbar-brand fw-bold">StoreFlow</span>
    <div>
        <a href="/" class="text-white me-3 text-decoration-none">Inventory</a>
        <a href="/add/" class="text-white me-3 text-decoration-none">Add Item</a>
        <a href="/logout/" class="text-white text-decoration-none">Logout</a>
    </div>
    <span class="text-white">Welcome, {{ request.user.username }}</span>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">Dashboard</h4>

    <div class="row g-3">

        <div class="col-md-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-title">Total Items</h6>
                    <h2>{{ total_items }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-title">Total Quantity</h6>
                    <h2>{{ total_quantity }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-title">Total Value</h6>
                    <h2>₹{{ total_value }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-danger shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-title">Low Stock Items</h6>
                    <h2>{{ low_stock_count }}</h2>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
